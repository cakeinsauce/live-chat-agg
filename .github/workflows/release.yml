name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to attach artifacts to (leave empty for dry-run, no release)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos-arm64
            artifact_name: live-chat-agg-macos-arm64.zip
            python_version: '3.12'
          - os: windows-latest
            label: windows-x64
            artifact_name: live-chat-agg-windows-x64.zip
            python_version: '3.12'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/Library/Caches/pip
            ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Smoke-test app import (catch packaging-relevant import errors)
        run: |
          python -c "from app.launcher import main; from app.server import create_app; from app.config import Settings; print('import OK')"

      - name: Build (PyInstaller)
        run: pyinstaller live_chat_agg.spec --noconfirm --clean

      - name: List build output
        shell: bash
        run: ls -la dist

      - name: Package (macOS — zip the .app bundle)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -ry "${{ matrix.artifact_name }}" "live-chat-agg.app"
          ls -la

      - name: Package (Windows — zip the .exe)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path "live-chat-agg.exe" -DestinationPath "${{ matrix.artifact_name }}" -Force
          Get-ChildItem

      - name: Smoke-test binary boots and serves overlay (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ./dist/live-chat-agg.app/Contents/MacOS/live-chat-agg &
          PID=$!
          # Poll instead of a fixed sleep so the test does not race binary cold-start.
          ok=
          for i in $(seq 40); do
            if ! kill -0 "$PID" 2>/dev/null; then echo "process exited early"; exit 1; fi
            if curl -fsS -m 5 http://127.0.0.1:8000/ >/dev/null 2>&1; then ok=1; break; fi
            sleep 3
          done
          if [ -z "$ok" ]; then echo "server did not come up in time"; kill $PID 2>/dev/null || true; exit 1; fi
          curl -fsS -m 5 http://127.0.0.1:8000/ | head -c 200
          echo
          curl -fsS -m 5 http://127.0.0.1:8000/static/overlay.css | head -c 200
          echo
          kill $PID || true
          wait $PID 2>/dev/null || true

      - name: Smoke-test binary boots and serves overlay (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # The onefile .exe self-extracts (~250 MB: PySide6 + Qt WebEngine + edge-tts)
          # to %TEMP% on first launch, which can take well over 10s on a cold runner.
          # Poll the server instead of sleeping a fixed amount so the smoke test does
          # not race the cold-start extraction.
          $proc = Start-Process -FilePath "dist\live-chat-agg.exe" -PassThru -WindowStyle Hidden
          try {
            $ok = $false
            for ($i = 1; $i -le 40; $i++) {
              if ($proc.HasExited) { throw "process exited early with code $($proc.ExitCode)" }
              try {
                $r = Invoke-WebRequest -UseBasicParsing -TimeoutSec 5 -Uri "http://127.0.0.1:8000/"
                if ($r.StatusCode -eq 200) { $ok = $true; break }
              } catch {
                Start-Sleep -Seconds 3
              }
            }
            if (-not $ok) { throw "server did not serve http://127.0.0.1:8000/ within timeout" }
            $css = Invoke-WebRequest -UseBasicParsing -TimeoutSec 5 -Uri "http://127.0.0.1:8000/static/overlay.css"
            if ($css.StatusCode -ne 200) { throw "overlay.css status $($css.StatusCode)" }
            Write-Host "smoke OK"
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: find artifacts -type f | sort

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
