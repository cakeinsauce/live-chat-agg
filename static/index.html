<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Chat Aggregator</title>
    <link rel="stylesheet" href="/static/overlay.css" />
  </head>
  <body>
    <div id="topbar" class="topbar">
      <span class="live-badge"><span class="live-dot"></span>LIVE</span>
      <span id="duration" class="duration">0:00:00</span>
      <span class="topbar-spacer"></span>
      <label id="opacity-control" class="opacity-control" title="Прозрачность панели">
        <span aria-hidden="true">🎚</span>
        <input id="opacity-slider" class="opacity-slider" type="range" min="20" max="100" value="85" step="1" aria-label="Прозрачность панели" />
      </label>
      <button id="lock-btn" class="topbar-btn" type="button" title="Lock overlay" aria-label="Lock overlay">🔓</button>
      <a id="settings-link" class="topbar-btn" href="/settings" title="Settings" aria-label="Settings">⚙</a>
    </div>
    <div id="stats" class="stats"></div>
    <div id="pinned" class="pinned" hidden></div>
    <div id="gifts" class="gifts"></div>
    <div id="chat" class="chat"></div>
    <div id="composer-mount"></div>
    <script src="/static/tts.js"></script>
    <script src="/static/overlay.js"></script>
  </body>
</html>
